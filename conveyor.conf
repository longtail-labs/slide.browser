# Hydraulic Conveyor configuration for Slide native macOS app

app {
  # Basic app metadata
  display-name = "Slide"
  fsname = slide
  rdns-name = long.tail.labs.Slide
  vendor = Hydraulic
  version = 0.1.0
  
  # Contact and project info
  contact-email = "jordan@howlett.io"
  vcs-url = "https://github.com/longtail-labs/slide.browser"
  license = "Proprietary"
  
  # App icon - using the main slide logo
  icons = "Slide/Slide/Slide/Assets.xcassets/AppIcon.appiconset/512.png"
  
  # macOS specific configuration
  mac {
    # Minimum macOS version (matches your SwiftUI requirement)
    info-plist {
      LSMinimumSystemVersion = "14.0"
      CFBundleIdentifier = ${app.rdns-name}
      CFBundleName = ${app.display-name}
      CFBundleDisplayName = ${app.display-name}
      CFBundleVersion = ${app.version}
      CFBundleShortVersionString = ${app.version}
      CFBundleExecutable = ${app.fsname}
      CFBundlePackageType = "APPL"
      NSHighResolutionCapable = true
      # Enable native SwiftUI features
      NSSupportsAutomaticGraphicsSwitching = true
    }
    
    # Bundle structure for native macOS app
    # After building with xcodebuild, we'll copy the compiled binary and frameworks
    inputs = [
      # Main executable
      build/Build/Products/Release/Slide.app/Contents/MacOS/Slide -> Contents/MacOS/Slide
      
      # Frameworks and libraries
      build/Build/Products/Release/Slide.app/Contents/Frameworks -> Contents/Frameworks
      
      # Resources (if any)
      build/Build/Products/Release/Slide.app/Contents/Resources -> Contents/Resources
      
      # ObjectBox model file (required at runtime)
      SlideCore/Sources/SlideDatabase/model-SlideDatabase.json -> Contents/Resources/model-SlideDatabase.json
      
      # Info.plist will be generated by Conveyor based on the config above
    ]
    
    # Entitlements for the app (matching your Xcode entitlements)
    entitlements-plist {
      # No sandboxing (matching your Xcode setup)
      "com.apple.security.app-sandbox" = false
      
      # JIT and memory permissions for ObjectBox and other features
      "com.apple.security.cs.allow-jit" = true
      "com.apple.security.cs.allow-unsigned-executable-memory" = true
      "com.apple.security.cs.disable-library-validation" = true
      # "com.apple.security.cs.disable-library-validation" = true
        
      # Automation support
      "com.apple.security.automation.apple-events" = true
      
      # NOTE: Application groups and push notifications require proper provisioning profiles
      # Uncomment these only when you have proper signing certificates and profiles
      # "com.apple.security.application-groups" = ["group.ltl.slide"]
      # "aps-environment" = "development"
      # "com.apple.developer.aps-environment" = "development"
    }
    
    # Updates configuration
    updates = aggressive
    deltas = 5
    
    # Notarization (you'll need to set these up)
    # Uncomment and configure when you have Apple credentials
    # notarization {
    #   issuer-id = ${env.APPLE_ISSUER_ID}
    #   key-id = ${env.APPLE_KEY_ID}
    #   private-key = ${env.APPLE_PRIVATE_KEY_PATH}
    # }
  }
  
  # Site configuration for distribution
  site {
    # base-url = "localhost:3000"  # For local testing, change to real URL for production
    
    # GitHub configuration (uncomment when ready to deploy)
    github {
      pages-branch = "gh-pages"
    }
  }
  
  # Target only macOS for now - set to your current architecture
  machines = [mac.aarch64]  # Change to mac.amd64 if on Intel Mac
}

# Compression and optimization
app.compression-level = "high"

# Conveyor compatibility level
conveyor.compatibility-level = 19