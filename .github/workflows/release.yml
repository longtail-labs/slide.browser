name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - master

permissions:
  contents: write

jobs:
  auto-tag:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      tag_name: ${{ steps.check.outputs.tag_name }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check and create tag
        id: check
        run: |
          VERSION=$(tr -d '[:space:]' < version.txt)
          TAG="v${VERSION}"
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Creating tag ${TAG}"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [auto-tag]
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.auto-tag.outputs.should_build == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < version.txt)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Set version in Xcode project
        run: |
          cd Slide/Slide
          xcrun agvtool new-marketing-version "${{ steps.version.outputs.VERSION }}"
          xcrun agvtool new-version -all "${{ steps.version.outputs.VERSION }}"

      - name: Resolve package dependencies
        run: |
          cd Slide/Slide
          xcodebuild -resolvePackageDependencies \
            -project "Slide.xcodeproj" \
            -scheme "Slide" \
            -derivedDataPath build

      - name: Build macOS app
        run: |
          cd Slide/Slide
          xcodebuild build \
            -project "Slide.xcodeproj" \
            -scheme "Slide" \
            -configuration "Release" \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Verify build
        run: |
          APP_PATH="Slide/Slide/build/Build/Products/Release/Slide.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Build failed — Slide.app not found"
            exit 1
          fi
          echo "Build successful"
          ls -la "$APP_PATH/Contents/"

      - name: Stage build for Conveyor
        run: |
          APP_PATH="Slide/Slide/build/Build/Products/Release/Slide.app"
          mkdir -p build/Build/Products/Release
          cp -R "$APP_PATH" build/Build/Products/Release/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: slide-unsigned-app
          path: build/Build/Products/Release/Slide.app
          if-no-files-found: error

  sign-and-release:
    needs: [auto-tag, build]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.auto-tag.outputs.should_build == 'true')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: slide-unsigned-app
          path: build/Build/Products/Release/Slide.app

      - name: Extract version
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < version.txt)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sign and release with Conveyor
        uses: hydraulic-software/conveyor/actions/build@v19.0
        with:
          command: make copied-site
          extra_flags: -f conveyor.ci.conf
        env:
          CONVEYOR_SIGNING_KEY: ${{ secrets.CONVEYOR_SIGNING_KEY }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          BUILD_VERSION: ${{ steps.version.outputs.VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
